apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default

  source:
    repoURL: "https://github.com/Project-A-Kubernetes/Project_A_STACKS_TOOLS.git"
    targetRevision: main
    path: stacks/
    helm:
      releaseName: kube-prometheus-stack
      valueFiles: 
        - value.yaml
    
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true 
      - CreateNamespace=true